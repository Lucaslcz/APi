<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Empresa - Hamburgueria Calabreso</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="/static/img/burguer.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/Global.css">
    <link rel="stylesheet" href="/static/css/Empresa.css">
</head>
<body>

    <header id="cabecalho">
        <button id="botaoInicio"><h1 id="nomeHamburgueria">HAMBURGUERIA CALABRESO</h1></button>

        <nav id="navegacao">
            <button id="botaoMenu">Menu</button>

            <div id="statusLoja">
                <span id="bolinhaStatus"></span>
                <span id="textoStatus">Aberto</span>
            </div>
        </nav>
    </header>

    <main id="mainEmpresa">

        <div id="topoEmpresa">
            <div id="topoEmpresaTexto">
                <span id="labelEmpresa">PAINEL ADMINISTRATIVO</span>
                <h1 id="tituloEmpresa">Empresa</h1>
                <p id="subtituloEmpresa">Visão geral, dados e avisos internos</p>
            </div>
            <span id="dataHoje"></span>
        </div>

        <section id="secaoCards">
            <div class="cardMetrica">
                <div class="cardMetricaIcone laranja"><i class="fa-solid fa-receipt"></i></div>
                <div class="cardMetricaInfo">
                    <span class="cardMetricaValor" id="statPedidosHoje">—</span>
                    <span class="cardMetricaLabel">Pedidos hoje</span>
                </div>
            </div>
            <div class="cardMetrica">
                <div class="cardMetricaIcone verde"><i class="fa-solid fa-money-bill-wave"></i></div>
                <div class="cardMetricaInfo">
                    <span class="cardMetricaValor" id="statFaturamentoHoje">—</span>
                    <span class="cardMetricaLabel">Faturamento hoje</span>
                </div>
            </div>
            <div class="cardMetrica">
                <div class="cardMetricaIcone azul"><i class="fa-solid fa-box-open"></i></div>
                <div class="cardMetricaInfo">
                    <span class="cardMetricaValor" id="statPedidosMes">—</span>
                    <span class="cardMetricaLabel">Pedidos este mês</span>
                </div>
            </div>
            <div class="cardMetrica">
                <div class="cardMetricaIcone roxo"><i class="fa-solid fa-chart-line"></i></div>
                <div class="cardMetricaInfo">
                    <span class="cardMetricaValor" id="statFaturamentoMes">—</span>
                    <span class="cardMetricaLabel">Faturamento este mês</span>
                </div>
            </div>
            <div class="cardMetrica">
                <div class="cardMetricaIcone amarelo"><i class="fa-solid fa-users"></i></div>
                <div class="cardMetricaInfo">
                    <span class="cardMetricaValor" id="statClientes">—</span>
                    <span class="cardMetricaLabel">Clientes cadastrados</span>
                </div>
            </div>
            <div class="cardMetrica">
                <div class="cardMetricaIcone rosa"><i class="fa-solid fa-bullseye"></i></div>
                <div class="cardMetricaInfo">
                    <span class="cardMetricaValor" id="statTicket">—</span>
                    <span class="cardMetricaLabel">Ticket médio (mês)</span>
                </div>
            </div>
        </section>

        <div id="gradeEmpresa">

            <section id="secaoDados">
                <div class="secaoHeader">
                    <div class="secaoTituloWrapper">
                        <i class="fa-solid fa-building"></i>
                        <h2>Dados da Empresa</h2>
                    </div>
                    <button id="btnEditarDados" class="btnSecaoAcao">Editar</button>
                </div>

                <div id="formDados">
                    <div class="campoForm">
                        <label>Nome do estabelecimento</label>
                        <input type="text" id="inputNome" class="inputEmpresa" disabled>
                    </div>
                    <div class="campoForm">
                        <label>CNPJ</label>
                        <input type="text" id="inputCNPJ" class="inputEmpresa" disabled>
                    </div>
                    <div class="duplo">
                        <div class="campoForm">
                            <label>Telefone</label>
                            <input type="text" id="inputTelefone" class="inputEmpresa" disabled>
                        </div>
                        <div class="campoForm">
                            <label>E-mail</label>
                            <input type="text" id="inputEmailEmpresa" class="inputEmpresa" disabled>
                        </div>
                    </div>
                    <div class="campoForm">
                        <label>Endereço</label>
                        <input type="text" id="inputEnderecoEmpresa" class="inputEmpresa" disabled>
                    </div>
                    <div class="campoForm">
                        <label>Horário de funcionamento</label>
                        <input type="text" id="inputHorario" class="inputEmpresa" disabled>
                    </div>
                    <div id="acoesDados" class="escondido">
                        <button id="btnSalvarDados" class="btnPrimario">
                            <i class="fa-solid fa-floppy-disk"></i> Salvar
                        </button>
                        <button id="btnCancelarDados" class="btnSecundario">Cancelar</button>
                    </div>
                </div>
            </section>

            <section id="secaoMural">
                <div class="secaoHeader">
                    <div class="secaoTituloWrapper">
                        <i class="fa-solid fa-bell"></i>
                        <h2>Mural Interno</h2>
                    </div>
                    <button id="btnNovoAviso" class="btnSecaoAcao">+ Aviso</button>
                </div>

                <div id="formAviso" class="escondido">
                    <textarea id="inputAviso" class="textareaEmpresa" placeholder="Escreva um aviso para a equipe..."></textarea>
                    <div class="acoesAviso">
                        <button id="btnPublicarAviso" class="btnPrimario">
                            <i class="fa-solid fa-paper-plane"></i> Publicar
                        </button>
                        <button id="btnCancelarAviso" class="btnSecundario">Cancelar</button>
                    </div>
                </div>

                <div id="listaAvisos">
                    <p id="muraiVazio" class="estadoVazio">Nenhum aviso publicado.</p>
                </div>
            </section>

        </div>

        <section id="secaoPopulares">
            <div class="secaoHeader">
                <div class="secaoTituloWrapper">
                    <i class="fa-solid fa-fire"></i>
                    <h2>Itens mais pedidos este mês</h2>
                </div>
            </div>
            <div id="listaPopulares">
                <p class="estadoVazio" id="popularesVazio">Carregando...</p>
            </div>
        </section>

    </main>

    <div id="toastEmpresa">
        <i class="fa-solid fa-check"></i>
        <span id="toastTexto"></span>
    </div>

    <script src="/static/js/Global.js"></script>
    <script src="/static/js/Empresa.js"></script>
    <script src="/static/js/Configuracoes.js"></script>

</body>
</html>
